    <style>
        /* 这里放置与主页相同的CSS样式 */
        :root {
            --primary: #1f2a3a;
            --secondary: #4b6ea8;

            background-attachment: fixed;
            padding-top: var(--header-height);

            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: var(--glass-shadow);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--blur));

            display: flex;

        .nav-links a::after {

            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary);
            transition: var(--transition);

            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;

        .page-header {
            background: linear-gradient(135deg, rgba(31, 42, 58, 0.95), rgba(75, 110, 168, 0.9));
            background-size: 180% 180%;
            animation: headerShift 12s ease infinite;
            color: white;
            padding: 40px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-top: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--glass-shadow);

        .page-title {
            font-size: 2.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;

        .page-title i {
            background: rgba(255, 255, 255, 0.22);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 10px 18px rgba(16, 24, 40, 0.2);
        }
        
        .section {
            background: var(--glass-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--blur));
            padding: 30px;
            margin: 30px 0;
            position: relative;
            overflow: hidden;
        }

        .section::after {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 60%;
            height: 80%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.35), transparent 70%);
            opacity: 0.6;
            pointer-events: none;
        }
        
        .publication-list {
            counter-reset: publication-counter;
        }
        
        .publication-item {
            padding: 20px 0 20px 60px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
        }
        
        .publication-item:last-child {
            border-bottom: none;
        }
        
        .publication-item::before {
            counter-increment: publication-counter;
            content: counter(publication-counter);
            position: absolute;
            left: 0;
            top: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--primary);
            box-shadow: 0 8px 16px rgba(16, 24, 40, 0.18);

        .publication-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }
        
        .publication-authors {
            color: var(--gray);
            margin-bottom: 8px;
            font-style: italic;
        }
        
        .publication-details {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }
        
        .publication-link {
            display: inline-flex;
            align-items: center;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;

        .publication-link i {

        .publication-link:hover {

        .loading {

            font-style: italic;

        .error-message {
            background: #ffeeee;

                <span>Publications</span>

    <script>
        // 移动导航切换
        const mobileToggle = document.querySelector('.mobile-toggle');
        const navLinks = document.querySelector('.nav-links');
        
        if (mobileToggle && navLinks) {
            mobileToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });
            
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', () => {
                    if (navLinks.classList.contains('active')) {
                        navLinks.classList.remove('active');
                    }
                });
            });
        }

        function normalizeAuthorName(author) {
            const trimmed = author.trim();
            if (!trimmed) return '';
            if (trimmed.includes(',')) {
                const [last, first] = trimmed.split(',').map(part => part.trim());
                return first ? `${first} ${last}` : last;
            }
            return trimmed;
        }

        function normalizeAuthors(authorField) {
            if (!authorField) return '';
            return authorField
                .split(/\s+and\s+/i)
                .map(normalizeAuthorName)
                .filter(Boolean)
                .join(', ');
        }

        function parseBibFields(fieldsText) {
            const fields = {};
            const fieldRegex = /(\w+)\s*=\s*(\{([\s\S]*?)\}|\"([\s\S]*?)\"|([^,]+))\s*,?/g;
            let match;
            while ((match = fieldRegex.exec(fieldsText)) !== null) {
                const key = match[1].toLowerCase();
                const value = (match[3] || match[4] || match[5] || '')
                    .replace(/[{}]/g, '')
                    .replace(/\s+/g, ' ')
                    .trim();
                fields[key] = value;
            }
            return fields;
        }

        function parseBibTex(bibText) {
            const cleaned = bibText.replace(/^\s*\[/, '').replace(/\]\s*$/, '').trim();
            const entries = [];
            let cursor = 0;
            while (cursor < cleaned.length) {
                const atIndex = cleaned.indexOf('@', cursor);
                if (atIndex === -1) break;
                const braceStart = cleaned.indexOf('{', atIndex);
                if (braceStart === -1) break;
                let depth = 0;
                let endIndex = braceStart;
                for (; endIndex < cleaned.length; endIndex++) {
                    const char = cleaned[endIndex];
                    if (char === '{') depth += 1;
                    if (char === '}') {
                        depth -= 1;
                        if (depth === 0) {
                            endIndex += 1;
                            break;
                        }
                    }
                }
                const entryText = cleaned.slice(atIndex, endIndex);
                cursor = endIndex;
                const entryMatch = entryText.match(/^@(\w+)\s*{\s*([^,]+)\s*,([\s\S]*)\}\s*$/);
                if (!entryMatch) continue;
                const entryType = entryMatch[1].toLowerCase();
                const fieldsText = entryMatch[3];
                const fields = parseBibFields(fieldsText);
                const yearValue = parseInt(fields.year, 10);
                entries.push({
                    type: entryType,
                    title: fields.title || '',
                    authors: normalizeAuthors(fields.author),
                    journal: fields.journal || fields.booktitle || '',
                    year: Number.isFinite(yearValue) ? yearValue : fields.year || '',
                    volume: fields.volume || '',
                    number: fields.number || '',
                    pages: fields.pages || '',
                    pdf: fields.pdf || '',
                    code: fields.code || '',
                    project: fields.project || ''
                });
            }
            return entries;
        }

        // 加载所有出版物
        async function loadPublications() {
            try {
                const response = await fetch('./_includes/publications.bib');
                if (!response.ok) throw new Error(`Failed to load publications: ${response.status}`);
                const publicationsText = await response.text();
                const publicationsData = parseBibTex(publicationsText);
                displayPublications(publicationsData);
            } catch (error) {
                console.error('Error loading publications:', error);
                document.getElementById('publications-content').innerHTML = `
                    <div class="error-message">
                        <p><strong>Error loading publications:</strong> ${error.message}</p>
                        <p>Please check the publications.bib file</p>
                    </div>
                `;
            }
        }

        function displayPublications(publicationsData) {
            const publicationsContainer = document.getElementById('publications-content');
            if (!publicationsContainer) return;
            
            publicationsContainer.innerHTML = '';
            
            if (!publicationsData || publicationsData.length === 0) {
                publicationsContainer.innerHTML = '<p>No publications available</p>';
                return;
            }
            
            // 按年份排序（最新优先）
            const sortedPublications = [...publicationsData].sort((a, b) => b.year - a.year);
            
            // 创建出版物列表
            const pubList = document.createElement('div');
            pubList.className = 'publication-list';
            publicationsContainer.appendChild(pubList);
            
            sortedPublications.forEach(pub => {
                const pubItem = document.createElement('div');
                pubItem.className = 'publication-item';
                
                // 生成链接HTML（如果存在）
                let linksHTML = '';
                if (pub.pdf) linksHTML += `<a href="${pub.pdf}" class="publication-link"><i class="far fa-file-pdf"></i> PDF</a>`;
                if (pub.code) linksHTML += `<a href="${pub.code}" class="publication-link"><i class="fab fa-github"></i> Code</a>`;
                if (pub.project) linksHTML += `<a href="${pub.project}" class="publication-link"><i class="fas fa-external-link-alt"></i> Project</a>`;
                const authorText = pub.authors || '';
                const authorHighlighted = authorText.replace(/\bHao Ren\b/g, '<strong class="highlight-author">Hao Ren</strong>');
                const venueParts = [pub.journal, pub.year].filter(Boolean).join(', ');
                pubItem.innerHTML = `
                    <div class="publication-title">${pub.title}</div>
                    <div class="publication-authors">${authorHighlighted}</div>
                    <div>${venueParts}</div>
                    ${linksHTML ? `<div class="publication-details">${linksHTML}</div>` : ''}
                `;
                pubList.appendChild(pubItem);
            });
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadPublications);
    </script>
</body>
